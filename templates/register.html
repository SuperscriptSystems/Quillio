<!DOCTYPE html>
<html lang="en">
<head>
          <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register - Quillio</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #2A3F4A; color: #F0F0F0; margin: 0; padding: 40px 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: #344955; border-radius: 12px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #F0F0F0; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #F0F0F0;
        }
        .optional { color: #9ca3af; font-size: 0.9em; font-weight: normal; }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-bottom: 5px;
            border: 1px solid #4a5e6a;
            border-radius: 8px;
            background: #2A3F4A;
            color: #F0F0F0;
            font-size: 15px;
            font-family: 'Roboto', sans-serif;
            resize: vertical;
            min-height: 40px;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #5cb85c;
            box-shadow: 0 0 0 1px #5cb85c;
        }
        input:invalid, textarea:invalid {
            border-color: #e53e3e;
        }
        input:invalid:focus, textarea:invalid:focus {
            box-shadow: 0 0 0 1px #e53e3e;
        }
        button { width: 100%; padding: 14px; background: #5cb85c; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background-color 0.3s ease; margin-top: 10px; }
        button:hover { background: #4a9a4a; }
        p { text-align: center; margin-top: 20px; font-size: 14px; }
        a { color: #5cb85c; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .flash-message { padding: 15px; margin-bottom: 20px; border-radius: 8px; color: #fff; text-align: center; }
        .warning { background-color: #f0ad4e; }
        .hint {
            color: #9ca3af;
            font-size: 0.8em;
            margin-top: -10px;
            margin-bottom: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create an Account</h1>
         {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('register') }}">
            <!-- Account credentials -->
            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="Enter your Email" required>
            </div>

            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" placeholder="Choose a Password" required>
            </div>

            <!-- Profile details -->
            <div class="form-group">
                <label for="full_name">Full Name <span class="required">*</span></label>
                <input type="text" id="full_name" name="full_name" placeholder="Your Full Name" required>
            </div>

            <!-- Initial settings -->
            <div class="form-group">
                <label for="lesson_length">Ideal Lesson Length (minutes) <span class="required">*</span></label>
                <input type="number"
                       id="lesson_length"
                       name="lesson_length"
                       min="10"
                       max="120"
                       value="30"
                       placeholder="Between 10-120 minutes"
                       required>
                <div class="hint">Recommended: 20-60 minutes</div>
            </div>

            <!-- Optional details -->
            <div class="form-group">
                <label for="age">Age <span class="optional">(optional, 1-120)</span></label>
                <input type="number"
                       id="age"
                       name="age"
                       min="1"
                       max="120"
                       placeholder="Your age"
                       oninput="this.setCustomValidity('')"
                       oninvalid="this.setCustomValidity('Please enter an age between 1 and 120')">
                <div class="hint">Must be at least 1 years old</div>
            </div>

            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
    <script>
        // Add client-side validation
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');

            form.addEventListener('submit', function(event) {
                const ageInput = document.getElementById('age');
                const lessonLengthInput = document.getElementById('lesson_length');

                // Validate age if provided
                if (ageInput.value) {
                    const age = parseInt(ageInput.value);
                    if (age < 1 || age > 120) {
                        ageInput.setCustomValidity('Age must be between 1 and 120');
                        ageInput.reportValidity();
                        event.preventDefault();
                        return false;
                    }
                }

                // Validate lesson length
                const lessonLength = parseInt(lessonLengthInput.value);
                if (lessonLength < 10 || lessonLength > 120) {
                    lessonLengthInput.setCustomValidity('Lesson length must be between 10 and 120 minutes');
                    lessonLengthInput.reportValidity();
                    event.preventDefault();
                    return false;
                }

                return true;
            });
        });
    </script>
</body>
</html>
